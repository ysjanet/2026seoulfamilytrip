<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首爾和風旅伴 - 全功能聯網版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --kawaii-pink: #ffdae0;
            --kawaii-blue: #d1e9ff;
            --kawaii-brown: #5a4a42;
            --kawaii-bg: #fff9f9;
        }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--kawaii-bg); 
            color: var(--kawaii-brown);
            -webkit-tap-highlight-color: transparent;
        }
        
        .k-card { 
            background: white; border-radius: 24px; 
            border: 2px solid var(--kawaii-pink);
            box-shadow: 4px 4px 0px var(--kawaii-pink);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; color: #bca096; border: none; background: none; cursor: pointer; }
        .nav-btn.active { color: #ff8a9d; }
        .nav-btn i { font-size: 1.3rem; margin-bottom: 4px; }
        .nav-text { font-size: 10px; font-weight: 900; }

        .day-pill {
            padding: 8px 18px; border-radius: 18px; background: white; 
            border: 2px solid var(--kawaii-blue); color: #88a6c4; font-weight: 900;
            white-space: nowrap; cursor: pointer;
        }
        .day-pill.active { background: var(--kawaii-blue); color: #5a7b9c; border-color: #aecce9; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-action { background: #ff8a9d; color: white; border-radius: 12px; font-weight: 900; box-shadow: 2px 2px 0px #e07183; transition: transform 0.1s; border:none; }
        .btn-action:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #e07183; }
        
        input, select, textarea { border-radius: 12px; border: 2px solid #fce4e8; padding: 12px; outline: none; width: 100%; font-weight: 700; font-family: 'Noto Sans TC', sans-serif; }
        
        .loading-overlay { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.8); z-index: 10; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 20px; }
        
        .status-tag { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 900; }
        .status-open { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }

        .tab-content { padding-bottom: 120px; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .fab { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; background: #ff8a9d; color: white; border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 4px 4px 0px #e07183; z-index: 40; border: none; cursor: pointer; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 350px; border-radius: 30px; padding: 24px; border: 3px solid var(--kawaii-pink); }
    </style>
</head>
<body>

    <!-- 彈窗 -->
    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title" class="font-black text-xl text-pink-500 mb-4">新增行程</h3>
            <div class="space-y-3">
                <input type="hidden" id="edit-id">
                <div class="flex gap-2">
                    <select id="site-day" class="w-1/3 text-sm">
                        <option value="D1">D1</option><option value="D2">D2</option>
                        <option value="D3">D3</option><option value="D4">D4</option>
                        <option value="D5">D5</option><option value="D6">D6</option>
                    </select>
                    <input type="time" id="site-time" class="flex-1 text-sm">
                </div>
                <input type="text" id="site-title" placeholder="景點/餐廳名稱 (例如: 陳玉華一隻雞)">
                <p class="text-[10px] text-gray-400 font-bold px-1">✨ 系統將自動抓取門面照片、地址與無障礙資訊</p>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal()" class="flex-1 py-3 font-bold text-gray-400 bg-gray-50 rounded-xl">取消</button>
                    <button onclick="saveAndSync()" class="flex-1 py-3 font-bold text-white bg-pink-400 rounded-xl shadow-[0_3px_0_#e07183]">儲存行程</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 頂部 -->
    <header class="bg-white px-5 py-4 sticky top-0 z-50 border-b-2 border-pink-100">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-[#ff8a9d]">首爾和風小筆記 🌸</h1>
                <p id="day-display" class="text-[10px] font-bold text-blue-400 tracking-widest uppercase">DAY 1 • 智慧聯網模式</p>
            </div>
            <button onclick="syncAllData()" class="text-blue-500 bg-blue-50 w-10 h-10 rounded-full flex items-center justify-center border-2 border-blue-100 shadow-sm active:scale-90 transition-transform">
                <i class="fa-solid fa-rotate"></i>
            </button>
        </div>
        <div id="day-selector" class="flex gap-2 overflow-x-auto py-3 no-scrollbar mt-2">
            <!-- 動態生成 Day Pill -->
        </div>
    </header>

    <main class="px-4 mt-4 max-w-md mx-auto">
        
        <!-- 1. 行程分頁 -->
        <section id="itinerary" class="tab-content">
            <div id="itinerary-list" class="space-y-6"></div>
            <button onclick="openModal()" class="fab"><i class="fa-solid fa-plus"></i></button>
        </section>

        <!-- 2. 錢包分頁 -->
        <section id="finance" class="tab-content hidden">
            <div class="k-card p-5 mb-6 border-yellow-200 shadow-[4px_4px_0px_#fef3c7]">
                <h3 class="font-black text-lg text-yellow-600 mb-4"><i class="fa-solid fa-calculator mr-2"></i>即時匯率換算</h3>
                <div class="flex items-center gap-3">
                    <input type="number" id="krw-input" oninput="convertCurrency()" placeholder="輸入 ₩ 韓元" class="bg-yellow-50 border-yellow-100">
                    <i class="fa-solid fa-arrow-right text-yellow-300"></i>
                    <div class="flex-1 bg-white p-3 rounded-xl border-2 border-yellow-100 text-center">
                        <span class="text-[10px] text-gray-400 font-bold block">港幣約</span>
                        <span id="hkd-result" class="text-xl font-black text-yellow-700">0.00</span>
                    </div>
                </div>
                <p class="text-[9px] text-yellow-600 font-bold mt-2 px-1">目前基準: 1 HKD ≈ <span id="rate-display">175</span> KRW</p>
            </div>

            <div class="flex justify-between items-center mb-4 px-2">
                <h2 class="font-black text-xl text-gray-700">💸 支出小帳本</h2>
                <div class="text-right">
                    <p class="text-[10px] text-gray-400 font-bold">總花費 (HKD)</p>
                    <span class="text-red-400 font-black text-xl" id="total-expense">$0.00</span>
                </div>
            </div>

            <div class="k-card p-3 flex gap-2 mb-4 border-gray-100">
                <input type="text" id="exp-name" placeholder="項目 (如: 晚餐)" class="flex-1 bg-gray-50 border-none">
                <input type="number" id="exp-amt" placeholder="₩" class="w-1/4 bg-gray-50 border-none text-right">
                <button onclick="addExpense()" class="btn-action px-4"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div id="expense-history" class="space-y-2"></div>
        </section>

        <!-- 3. 購物清單 -->
        <section id="shopping" class="tab-content hidden">
            <h2 class="font-black text-2xl mb-4 text-pink-500">🛍️ 購物清單</h2>
            <div class="k-card p-3 flex gap-2 mb-4 border-pink-100">
                <input type="text" id="shop-input" placeholder="想買什麼？" class="flex-1 border-none bg-pink-50">
                <button onclick="addShopItem()" class="btn-action px-4"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div id="shopping-items" class="space-y-2"></div>
        </section>

        <!-- 4. 翻譯助理 -->
        <section id="translate" class="tab-content hidden">
            <h2 class="font-black text-2xl mb-4 text-blue-500">🗣️ 常用韓文</h2>
            <div id="translation-list" class="space-y-4"></div>
        </section>

    </main>

    <!-- 底部導航 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-pink-100 flex justify-between px-2 pb-[env(safe-area-inset-bottom)] z-50">
        <button onclick="switchTab('itinerary')" id="nav-itinerary" class="nav-btn active">
            <i class="fa-solid fa-map-location-dot"></i><span class="nav-text">行程</span>
        </button>
        <button onclick="switchTab('finance')" id="nav-finance" class="nav-btn">
            <i class="fa-solid fa-wallet"></i><span class="nav-text">錢包</span>
        </button>
        <button onclick="switchTab('shopping')" id="nav-shopping" class="nav-btn">
            <i class="fa-solid fa-heart"></i><span class="nav-text">清單</span>
        </button>
        <button onclick="switchTab('translate')" id="nav-translate" class="nav-btn">
            <i class="fa-solid fa-comment-dots"></i><span class="nav-text">翻譯</span>
        </button>
    </nav>

    <script>
        // --- 初始資料 ---
        let sites = JSON.parse(localStorage.getItem('smart_sites_v5')) || [
            { id: 1, day: "D1", time: "11:00", title: "永登浦站 樂天百貨", address: "首爾特別市永登浦區京仁路846", hours: "10:30-20:00", elevator: "3號出口升降機直達百貨大門", img: "https://placehold.co/600x400/ffdae0/5a4a42?text=Lotte+Department+Store" }
        ];
        let expenses = JSON.parse(localStorage.getItem('smart_exp_v5')) || [];
        let shopping = JSON.parse(localStorage.getItem('smart_shop_v5')) || [];
        let currentDay = "D1";
        let exchangeRate = 175;

        // --- 初始化 ---
        async function init() {
            renderDaySelectors();
            renderItinerary();
            renderExpenses();
            renderShopping();
            renderTranslations();
            updateLiveExchangeRate();
        }

        // --- 模擬同步地點資訊 ---
        async function syncSiteData(id) {
            const site = sites.find(s => s.id === id);
            if(!site) return;

            const card = document.getElementById(`card-${id}`);
            if(card) card.querySelector('.loading-overlay').style.display = 'flex';

            try {
                // 模擬 API 延遲
                await new Promise(r => setTimeout(r, 1000));
                
                // 產生安全的圖片網址 (移除有問題的中文與字串編碼)
                site.img = "https://placehold.co/600x400/ffdae0/5a4a42?text=Seoul+Location";
                
                saveSites();
                renderItinerary();
            } catch (error) {
                console.error("Sync Error:", error);
                if(card) card.querySelector('.loading-overlay').style.display = 'none';
            }
        }

        function renderItinerary() {
            const list = document.getElementById('itinerary-list');
            const filtered = sites.filter(s => s.day === currentDay).sort((a,b) => a.time.localeCompare(b.time));
            
            list.innerHTML = filtered.map(s => `
                <div id="card-${s.id}" class="k-card">
                    <div class="loading-overlay">
                        <div class="animate-spin rounded-full h-10 w-10 border-4 border-pink-400 border-t-transparent mb-2"></div>
                        <p class="text-[10px] font-black text-pink-500 uppercase tracking-widest">Searching Info...</p>
                    </div>
                    <div class="relative">
                        <img src="${s.img || 'https://placehold.co/600x400/ffdae0/5a4a42?text=Searching...'}" class="w-full h-44 object-cover">
                        <div class="absolute top-3 right-3 flex gap-2">
                             <button onclick="deleteSite(${s.id})" class="bg-white/90 p-2.5 rounded-full shadow-lg text-red-400"><i class="fa-solid fa-trash-can text-sm"></i></button>
                        </div>
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-4">
                            <h4 class="font-black text-white text-lg leading-tight">${s.title}</h4>
                            <p class="text-[10px] text-gray-300 font-bold mt-1"><i class="fa-solid fa-location-dot mr-1"></i>${s.address || '待更新地址'}</p>
                        </div>
                    </div>
                    <div class="p-4 space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-[11px] font-black text-blue-500 bg-blue-50 px-3 py-1 rounded-full"><i class="fa-regular fa-clock mr-1"></i>預計 ${s.time}</span>
                        </div>
                        <div class="bg-green-50 p-3 rounded-2xl border-2 border-green-100">
                            <p class="text-[11px] text-green-700 font-black mb-1"><i class="fa-solid fa-wheelchair mr-1"></i> 無障礙升降機資訊：</p>
                            <p class="text-[13px] text-gray-600 font-bold leading-relaxed">${s.elevator || '點擊上方地圖尋找最近出口'}</p>
                        </div>
                        <div class="flex gap-2 pt-1">
                            <a href="https://www.google.com/maps/search/?api=1&query=Seoul" target="_blank" class="flex-1 text-center py-2.5 bg-pink-50 text-pink-500 rounded-xl font-black text-xs">Google Map</a>
                        </div>
                    </div>
                </div>
            `).join('');

            if(filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-20"><i class="fa-solid fa-mug-hot text-4xl text-pink-100 mb-3"></i><p class="text-gray-300 font-black">Day ${currentDay.replace('D','')} 暫無行程</p></div>`;
            }
        }

        // --- 錢包與匯率 ---
        async function updateLiveExchangeRate() {
            try {
                const res = await fetch('https://api.exchangerate-api.com/v4/latest/HKD');
                const data = await res.json();
                if(data.rates.KRW) {
                    exchangeRate = data.r
