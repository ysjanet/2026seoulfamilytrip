<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首爾旅伴 - 雲端同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" />
    <style>
        :root { 
            --kawaii-pink: #ffdae0;
            --kawaii-blue: #d1e9ff;
            --kawaii-brown: #5a4a42;
            --kawaii-bg: #fff9f9;
        }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--kawaii-bg); 
            color: var(--kawaii-brown);
            -webkit-tap-highlight-color: transparent;
        }
        .k-card { 
            background: white; border-radius: 24px; 
            border: 2px solid var(--kawaii-pink);
            box-shadow: 4px 4px 0px var(--kawaii-pink);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; color: #bca096; border: none; background: none; cursor: pointer; }
        .nav-btn.active { color: #ff8a9d; }
        .nav-btn i { font-size: 1.3rem; margin-bottom: 4px; }
        .nav-text { font-size: 10px; font-weight: 900; }
        .day-pill {
            padding: 8px 18px; border-radius: 18px; background: white; 
            border: 2px solid var(--kawaii-blue); color: #88a6c4; font-weight: 900;
            white-space: nowrap; cursor: pointer;
        }
        .day-pill.active { background: var(--kawaii-blue); color: #5a7b9c; border-color: #aecce9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .btn-action { background: #ff8a9d; color: white; border-radius: 12px; font-weight: 900; box-shadow: 2px 2px 0px #e07183; transition: transform 0.1s; border:none; cursor: pointer; }
        .btn-action:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #e07183; }
        input, select, textarea { border-radius: 12px; border: 2px solid #fce4e8; padding: 12px; outline: none; width: 100%; font-weight: 700; font-family: 'Noto Sans TC', sans-serif; }
        .loading-overlay { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.8); z-index: 10; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 20px; pointer-events: none; }
        .tab-content { padding-bottom: 120px; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fab { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; background: #ff8a9d; color: white; border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 4px 4px 0px #e07183; z-index: 40; border: none; cursor: pointer; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; pointer-events: none; }
        .modal-content { background: white; width: 100%; max-width: 350px; border-radius: 30px; padding: 24px; border: 3px solid var(--kawaii-pink); pointer-events: auto; }
        .modal-overlay[style*="display: flex"], .loading-overlay[style*="display: flex"] { pointer-events: auto; }

        /* Cloud Status Indicator */
        .cloud-status { font-size: 10px; font-weight: 900; display: flex; items-center; gap: 4px; padding: 4px 10px; border-radius: 10px; }
        .cloud-online { background: #dcfce7; color: #16a34a; }
        .cloud-offline { background: #fee2e2; color: #dc2626; }
    </style>
</head>
<body>
    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title" class="font-black text-xl text-pink-500 mb-4">新增行程</h3>
            <div class="space-y-3">
                <div class="flex gap-2">
                    <select id="site-day" class="w-1/3 text-sm">
                        <option value="D1">D1</option><option value="D2">D2</option>
                        <option value="D3">D3</option><option value="D4">D4</option>
                        <option value="D5">D5</option><option value="D6">D6</option>
                    </select>
                    <input type="time" id="site-time" class="flex-1 text-sm">
                </div>
                <input type="text" id="site-title" placeholder="景點/餐廳名稱 (例如: 陳玉華一隻雞)">
                <p class="text-[10px] text-gray-400 font-bold px-1">✨ 儲存後可直接點擊卡片文字修改地址及資訊</p>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal()" class="flex-1 py-3 font-bold text-gray-400 bg-gray-50 rounded-xl cursor-pointer">取消</button>
                    <button onclick="saveAndSync()" class="flex-1 py-3 font-bold text-white bg-pink-400 rounded-xl shadow-[0_3px_0_#e07183] cursor-pointer">雲端儲存</button>
                </div>
            </div>
        </div>
    </div>

    <header class="bg-white px-5 py-4 sticky top-0 z-50 border-b-2 border-pink-100">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-[#ff8a9d]">首爾和風小筆記 🌸</h1>
                <p id="day-display" class="text-[10px] font-bold text-blue-400 tracking-widest uppercase mt-1">DAY 1 • 即時同步中</p>
            </div>
            <div id="connection-status" class="cloud-status cloud-offline">
                <i class="fa-solid fa-cloud"></i> <span>連線中...</span>
            </div>
        </div>
        <div id="day-selector" class="flex gap-2 overflow-x-auto py-3 no-scrollbar mt-2"></div>
    </header>

    <main class="px-4 mt-4 max-w-md mx-auto relative z-0">
        <!-- 1. 行程分頁 -->
        <section id="itinerary" class="tab-content">
            <div id="itinerary-list" class="space-y-6"></div>
            <button onclick="openModal()" class="fab cursor-pointer"><i class="fa-solid fa-plus"></i></button>
        </section>

        <!-- 2. 錢包分頁 -->
        <section id="finance" class="tab-content hidden">
            <div class="k-card p-5 mb-6 border-yellow-200 shadow-[4px_4px_0px_#fef3c7]">
                <h3 class="font-black text-lg text-yellow-600 mb-4"><i class="fa-solid fa-calculator mr-2"></i>即時匯率換算</h3>
                <div class="flex items-center gap-3">
                    <input type="number" id="krw-input" oninput="convertCurrency()" placeholder="輸入 ₩ 韓元" class="bg-yellow-50 border-yellow-100 relative z-10">
                    <i class="fa-solid fa-arrow-right text-yellow-300"></i>
                    <div class="flex-1 bg-white p-3 rounded-xl border-2 border-yellow-100 text-center">
                        <span class="text-[10px] text-gray-400 font-bold block">港幣約</span>
                        <span id="hkd-result" class="text-xl font-black text-yellow-700">0.00</span>
                    </div>
                </div>
                <p class="text-[9px] text-yellow-600 font-bold mt-2 px-1">目前基準: 1 HKD ≈ <span id="rate-display">175</span> KRW</p>
            </div>

            <div class="flex justify-between items-center mb-4 px-2">
                <h2 class="font-black text-xl text-gray-700">💸 支出小帳本</h2>
                <div class="text-right">
                    <p class="text-[10px] text-gray-400 font-bold">總花費 (HKD)</p>
                    <span class="text-red-400 font-black text-xl" id="total-expense">$0.00</span>
                </div>
            </div>

            <div class="k-card p-3 flex gap-2 mb-4 border-gray-100 relative z-10">
                <input type="text" id="exp-name" placeholder="項目 (如: 晚餐)" class="flex-1 bg-gray-50 border-none relative z-10">
                <input type="number" id="exp-amt" placeholder="₩" class="w-1/4 bg-gray-50 border-none text-right relative z-10">
                <button onclick="addExpense()" class="btn-action px-4 cursor-pointer relative z-10"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div id="expense-history" class="space-y-2"></div>
        </section>

        <!-- 3. 購物清單 -->
        <section id="shopping" class="tab-content hidden">
            <h2 class="font-black text-2xl mb-4 text-pink-500">🛍️ 購物清單</h2>
            <div class="k-card p-3 flex gap-2 mb-4 border-pink-100 relative z-10">
                <input type="text" id="shop-input" placeholder="想買什麼？" class="flex-1 border-none bg-pink-50 relative z-10">
                <button onclick="addShopItem()" class="btn-action px-4 cursor-pointer relative z-10"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div id="shopping-items" class="space-y-2"></div>
        </section>

        <!-- 4. 翻譯 -->
        <section id="translate" class="tab-content hidden">
            <h2 class="font-black text-2xl mb-4 text-blue-500">🗣️ 常用韓文</h2>
            <div id="translation-list" class="space-y-4"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-pink-100 flex justify-between px-2 pb-[env(safe-area-inset-bottom)] z-50">
        <button onclick="switchTab('itinerary')" id="nav-itinerary" class="nav-btn active">
            <i class="fa-solid fa-map-location-dot pointer-events-none"></i><span class="nav-text pointer-events-none">行程</span>
        </button>
        <button onclick="switchTab('finance')" id="nav-finance" class="nav-btn">
            <i class="fa-solid fa-wallet pointer-events-none"></i><span class="nav-text pointer-events-none">錢包</span>
        </button>
        <button onclick="switchTab('shopping')" id="nav-shopping" class="nav-btn">
            <i class="fa-solid fa-heart pointer-events-none"></i><span class="nav-text pointer-events-none">清單</span>
        </button>
        <button onclick="switchTab('translate')" id="nav-translate" class="nav-btn">
            <i class="fa-solid fa-comment-dots pointer-events-none"></i><span class="nav-text pointer-events-none">翻譯</span>
        </button>
    </nav>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        // 用戶提供的 Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyDX9nObgvU0GHNpaAxnbQfeScn7z-ly5Tc",
            authDomain: "seoul-family-trip.firebaseapp.com",
            databaseURL: "https://seoul-family-trip-default-rtdb.firebaseio.com",
            projectId: "seoul-family-trip",
            storageBucket: "seoul-family-trip.firebasestorage.app",
            messagingSenderId: "646665337395",
            appId: "1:646665337395:web:31549121e0e94731240146"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 全域狀態
        window.sites = [];
        window.expenses = [];
        window.shopping = [];
        window.currentDay = "D1";
        window.exchangeRate = 175;

        // --- 監聽雲端資料變化 (Realtime Sync) ---
        const connectedRef = ref(db, ".info/connected");
        onValue(connectedRef, (snap) => {
            const statusBadge = document.getElementById('connection-status');
            if (snap.val() === true) {
                statusBadge.className = "cloud-status cloud-online";
                statusBadge.innerHTML = '<i class="fa-solid fa-cloud"></i> <span>已連線</span>';
            } else {
                statusBadge.className = "cloud-status cloud-offline";
                statusBadge.innerHTML = '<i class="fa-solid fa-cloud-bolt"></i> <span>斷線中</span>';
            }
        });

        onValue(ref(db, 'sites'), (snapshot) => {
            const data = snapshot.val();
            window.sites = data ? Object.entries(data).map(([key, val]) => ({...val, _key: key})) : [];
            if(document.getElementById('itinerary').classList.contains('hidden') === false) window.renderItinerary();
        });

        onValue(ref(db, 'expenses'), (snapshot) => {
            const data = snapshot.val();
            window.expenses = data ? Object.entries(data).map(([key, val]) => ({...val, _key: key})).sort((a,b)=> b.timestamp - a.timestamp) : [];
            window.renderExpenses();
        });

        onValue(ref(db, 'shopping'), (snapshot) => {
            const data = snapshot.val();
            window.shopping = data ? Object.entries(data).map(([key, val]) => ({...val, _key: key})) : [];
            window.renderShopping();
        });

        // --- 核心操作函數 (暴露給全域以供按鈕呼叫) ---
        window.saveAndSync = function() {
            const title = document.getElementById('site-title').value;
            const day = document.getElementById('site-day').value;
            const time = document.getElementById('site-time').value;
            if(!title || !time) return;

            push(ref(db, 'sites'), {
                day, time, title,
                address: "", elevator: "",
                img: `https://placehold.co/600x400/ffdae0/5a4a42?text=${encodeURIComponent(title)}`,
                timestamp: Date.now()
            });

            window.setDay(day);
            document.getElementById('modal').style.display = 'none';
        };

        window.deleteSite = function(key) { remove(ref(db, `sites/${key}`)); };

        window.updateSiteData = function(key, field, newValue) {
            const updates = {};
            updates[`sites/${key}/${field}`] = newValue.trim();
            update(ref(db), updates);
        };

        window.addExpense = function() {
            const name = document.getElementById('exp-name').value;
            const amt = document.getElementById('exp-amt').value;
            if(!name || !amt) return;
            push(ref(db, 'expenses'), { name, amt: Number(amt), timestamp: Date.now() });
            document.getElementById('exp-name').value = '';
            document.getElementById('exp-amt').value = '';
        };

        window.deleteExpense = function(key) { remove(ref(db, `expenses/${key}`)); };

        window.addShopItem = function() {
            const input = document.getElementById('shop-input');
            if(!input.value) return;
            push(ref(db, 'shopping'), { text: input.value, done: false, timestamp: Date.now() });
            input.value = '';
        };

        window.toggleShop = function(key, currentStatus) {
            update(ref(db), { [`shopping/${key}/done`]: !currentStatus });
        };

        window.deleteShop = function(key) { remove(ref(db, `shopping/${key}`)); };

        // --- UI 渲染函數 ---
        window.initApp = async function() {
            window.renderDaySelectors();
            window.renderTranslations();
            try {
                const res = await fetch('https://api.exchangerate-api.com/v4/latest/HKD');
                const data = await res.json();
                if(data.rates.KRW) {
                    window.exchangeRate = data.rates.KRW;
                    document.getElementById('rate-display').innerText = window.exchangeRate.toFixed(1);
                    window.renderExpenses();
                }
            } catch(e) {}
        };

        window.renderDaySelectors = function() {
            const container = document.getElementById('day-selector');
            container.innerHTML = ["D1", "D2", "D3", "D4", "D5", "D6"].map(d => `
                <div onclick="setDay('${d}')" class="day-pill ${window.currentDay === d ? 'active' : ''}">${d}</div>
            `).join('');
        };

        window.setDay = function(d) { 
            window.currentDay = d; 
            document.getElementById('day-display').innerText = `DAY ${d.replace('D','')} • 即時同步中`; 
            window.renderDaySelectors(); 
            window.renderItinerary(); 
        };

        window.renderItinerary = function() {
            const list = document.getElementById('itinerary-list');
            const filtered = window.sites.filter(s => s.day === window.currentDay).sort((a,b) => a.time.localeCompare(b.time));

            if(filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-20"><i class="fa-solid fa-mug-hot text-4xl text-pink-100 mb-3"></i><p class="text-gray-300 font-black">Day ${window.currentDay.replace('D','')} 暫無行程</p></div>`;
                return;
            }

            list.innerHTML = filtered.map(s => `
                <div class="k-card relative z-10">
                    <div class="relative">
                        <img src="${s.img}" class="w-full h-44 object-cover">
                        <div class="absolute top-3 right-3 flex gap-2 z-20">
                             <button onclick="deleteSite('${s._key}')" class="bg-white/90 p-2.5 rounded-full shadow-lg text-red-400 cursor-pointer relative"><i class="fa-solid fa-trash-can text-sm pointer-events-none"></i></button>
                        </div>
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-4">
                            <h4 class="font-black text-white text-lg leading-tight">${s.title}</h4>
                            <p class="text-[10px] text-gray-300 font-bold mt-1">
                                <i class="fa-solid fa-location-dot mr-1"></i>
                                <span contenteditable="true" onblur="updateSiteData('${s._key}', 'address', this.innerText)" class="border-b border-dashed border-gray-400 cursor-text">${s.address || '點擊此處手動輸入地址...'}</span>
                            </p>
                        </div>
                    </div>
                    <div class="p-4 space-y-4">
                        <span class="text-[11px] font-black text-blue-500 bg-blue-50 px-3 py-1 rounded-full"><i class="fa-regular fa-clock mr-1"></i>預計 ${s.time}</span>
                        <div class="bg-green-50 p-3 rounded-2xl border-2 border-green-100">
                            <p class="text-[11px] text-green-700 font-black mb-1"><i class="fa-solid fa-wheelchair mr-1"></i> 無障礙資訊：</p>
                            <p contenteditable="true" onblur="updateSiteData('${s._key}', 'elevator', this.innerText)" class="text-[13px] text-gray-600 font-bold leading-relaxed border-b border-dashed border-green-300 cursor-text min-h-[20px]">${s.elevator || '點擊此處輸入無障礙電梯資訊...'}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        };

        window.renderExpenses = function() {
            const list = document.getElementById('expense-history');
            let total = 0;
            list.innerHTML = window.expenses.map(e => {
                total += Number(e.amt);
                return `<div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-50 mb-2 relative z-10">
                    <div class="font-bold text-sm text-gray-700">${e.name} <span class="text-[10px] text-gray-300 ml-2">₩${Number(e.amt).toLocaleString()}</span></div>
                    <button onclick="deleteExpense('${e._key}')" class="text-gray-200 cursor-pointer relative z-20"><i class="fa-solid fa-circle-xmark pointer-events-none"></i></button>
                </div>`;
            }).join('');
            document.getElementById('total-expense').innerText = "$" + (total / window.exchangeRate).toFixed(2);
        };

        window.renderShopping = function() {
            const list = document.getElementById('shopping-items');
            list.innerHTML = window.shopping.map(s => `
                <div class="flex items-center bg-white p-4 rounded-2xl shadow-sm border border-pink-50 gap-3 relative z-10">
                    <input type="checkbox" ${s.done ? 'checked' : ''} onchange="toggleShop('${s._key}', ${s.done})" class="w-5 h-5 accent-pink-400 cursor-pointer relative z-20">
                    <span class="font-bold text-sm flex-1 ${s.done ? 'line-through text-gray-300' : 'text-gray-600'}">${s.text}</span>
                    <button onclick="deleteShop('${s._key}')" class="text-gray-200 cursor-pointer relative z-20"><i class="fa-solid fa-trash-can pointer-events-none"></i></button>
                </div>
            `).join('');
        };

        window.renderTranslations = function() {
            const trans = [
                { zh: "請問電梯在哪裡？", ko: "엘리베이터가 어디에 있나요?" },
                { zh: "這個可以退稅嗎？", ko: "텍스 리펀드 가능한가요?" },
                { zh: "請給我一張收據", ko: "영수증 주세요" },
                { zh: "不好意思，我是推輪椅的", ko: "죄송합니다, 휠체어 사용자입니다" }
            ];
            document.getElementById('translation-list').innerHTML = trans.map(t => `
                <div class="k-card p-4 border-blue-50 relative z-10">
                    <p class="text-[10px] text-blue-400 font-black mb-1">${t.zh}</p>
                    <p class="font-black text-gray-700 text-lg mb-3">${t.ko}</p>
                    <button onclick="speakKorean('${t.ko}')" class="w-full bg-blue-50 text-blue-500 py-3 rounded-xl font-black text-xs flex items-center justify-center gap-2 cursor-pointer relative z-20">
                        <i class="fa-solid fa-volume-high pointer-events-none"></i> <span class="pointer-events-none">播放語音</span>
                    </button>
                </div>
            `).join('');
        };

        window.initApp();

    </script>
    <script>
        // 非 Firebase 相關的一般輔助函數
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
            document.getElementById('day-selector').style.display = (id === 'itinerary') ? 'flex' : 'none';
        }
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function convertCurrency() {
            const val = document.getElementById('krw-input').value;
            document.getElementById('hkd-result').innerText = val ? (val / window.exchangeRate).toFixed(2) : "0.00";
        }
        function speakKorean(text) {
            if (!window.speechSynthesis) return alert('不支援語音播放');
            const ut = new SpeechSynthesisUtterance(text); ut.lang = 'ko-KR'; window.speechSynthesis.speak(ut);
        }
    </script>
</body>
</html>
